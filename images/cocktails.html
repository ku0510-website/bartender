<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>50 經典調酒指南</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --cream: #f5efe3;
    --amber: #c8882a;
    --amber-light: #e8b24a;
    --amber-dark: #8a5a10;
    --copper: #b5622a;
    --smoke: #6b5f4e;
    --paper: #ede5d2;
    --gold: #d4a853;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--ink);
    background-image: 
      radial-gradient(ellipse at 20% 10%, rgba(200,136,42,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(181,98,42,0.06) 0%, transparent 60%);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 4rem 2rem 2rem;
    position: relative;
  }

  header::before {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--amber);
    margin: 0 auto 1.5rem;
  }

  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  h1 em {
    font-style: italic;
    color: var(--amber-light);
  }

  .header-sub {
    font-size: 0.85rem;
    color: var(--smoke);
    letter-spacing: 0.05em;
    margin-top: 1rem;
  }

  .controls {
    max-width: 900px;
    margin: 2.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-wrap svg {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--smoke);
    width: 16px;
    height: 16px;
  }

  #search {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,136,42,0.2);
    border-radius: 4px;
    padding: 0.65rem 1rem 0.65rem 2.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--smoke); }
  #search:focus { border-color: var(--amber); }

  .filter-btns {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid rgba(200,136,42,0.25);
    border-radius: 3px;
    padding: 0.5rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--smoke);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
  }

  .count-bar {
    text-align: center;
    font-size: 0.75rem;
    color: var(--smoke);
    margin: 1.5rem auto 0;
    letter-spacing: 0.05em;
  }

  .count-bar span { color: var(--amber); }

  .grid {
    max-width: 1400px;
    margin: 2rem auto;
    padding: 0 1.5rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: linear-gradient(145deg, #221a0e, #1a1208);
    border: 1px solid rgba(200,136,42,0.15);
    border-radius: 6px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .card:hover {
    border-color: rgba(200,136,42,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .card:hover::before { opacity: 1; }

  .card.expanded {
    border-color: var(--amber);
  }

  .card-num {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--amber-dark);
    margin-bottom: 0.5rem;
    font-family: 'DM Sans', sans-serif;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .card-badges {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-bottom: 0.9rem;
  }

  .badge {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    border: 1px solid;
  }

  .badge-spirit {
    color: var(--amber-light);
    border-color: rgba(200,136,42,0.3);
    background: rgba(200,136,42,0.08);
  }

  .badge-method {
    color: var(--copper);
    border-color: rgba(181,98,42,0.3);
    background: rgba(181,98,42,0.08);
  }

  .card-preview {
    font-size: 0.8rem;
    color: var(--smoke);
    line-height: 1.5;
  }

  .card-expand {
    display: none;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid rgba(200,136,42,0.12);
    animation: slideDown 0.25s ease;
  }

  .card.expanded .card-expand { display: block; }

  .section-label {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,136,42,0.15);
  }

  .ingredients-list {
    list-style: none;
    margin-bottom: 1.25rem;
  }

  .ingredients-list li {
    font-size: 0.82rem;
    color: #c8b99a;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.75rem;
  }

  .ingredients-list li:last-child { border-bottom: none; }

  .ing-name { color: var(--cream); }
  .ing-amount { 
    color: var(--amber); 
    font-size: 0.75rem;
    white-space: nowrap;
    font-weight: 500;
  }

  .method-text {
    font-size: 0.82rem;
    color: #c8b99a;
    line-height: 1.7;
  }

  .garnish-row {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.78rem;
    color: var(--smoke);
  }

  .garnish-row span:first-child {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber-dark);
    white-space: nowrap;
  }

  /* ── 成品圖片 ── */
  .card-photo-wrap {
    margin-top: 1.25rem;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    background: #111;
  }

  .card-photo-wrap img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .card-photo-wrap img.loaded {
    opacity: 1;
  }

  .card-photo-wrap:hover img {
    transform: scale(1.04);
  }

  .photo-skeleton {
    width: 100%;
    height: 200px;
    background: linear-gradient(90deg, #1e1508 25%, #2a1e0a 50%, #1e1508 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    position: absolute;
    top: 0; left: 0;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--amber-dark);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
  }

  .photo-skeleton.hidden { display: none; }

  .photo-credit {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0.4rem 0.6rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    font-size: 0.6rem;
    color: rgba(255,255,255,0.5);
    text-align: right;
  }

  .photo-credit a {
    color: rgba(255,255,255,0.6);
    text-decoration: none;
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .toggle-icon {
    position: absolute;
    bottom: 1.25rem;
    right: 1.5rem;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(200,136,42,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--amber-dark);
  }

  .card:hover .toggle-icon { border-color: var(--amber); color: var(--amber); }
  .card.expanded .toggle-icon { background: var(--amber); color: var(--ink); border-color: var(--amber); transform: rotate(45deg); }

  .hidden { display: none !important; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }


  /* ── 心情篩選 ── */
  .mood-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 0;
  }

  .mood-label {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--smoke);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .mood-label::before,
  .mood-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,136,42,0.12);
  }

  .mood-btns {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mood-btn {
    background: transparent;
    border: 1px solid rgba(200,136,42,0.18);
    border-radius: 100px;
    padding: 0.55rem 1.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--smoke);
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    gap: 0.45rem;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .mood-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s;
    border-radius: 100px;
  }

  .mood-btn:hover {
    color: var(--cream);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  .mood-btn.active {
    color: var(--ink);
    font-weight: 500;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  .mood-btn .mood-emoji { font-size: 1rem; line-height: 1; }

  /* Individual mood colours */
  .mood-happy  { --mc: #f5c842; }
  .mood-relax  { --mc: #6bcfb5; }
  .mood-miss   { --mc: #a78bfa; }
  .mood-sexy   { --mc: #f472b6; }
  .mood-romantic { --mc: #fb7185; }
  .mood-drunk  { --mc: #f97316; }

  .mood-btn:hover  { border-color: var(--mc); color: var(--mc); }
  .mood-btn.active { background: var(--mc); border-color: var(--mc); }
  .mood-btn.active::before { opacity: 0; }

  /* mood tag on card */
  .mood-tags {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-top: 0.6rem;
  }

  .mood-tag {
    font-size: 0.6rem;
    padding: 0.18rem 0.5rem;
    border-radius: 100px;
    opacity: 0.7;
  }

  .mood-tag.happy    { background: rgba(245,200,66,0.15);  color: #f5c842; border: 1px solid rgba(245,200,66,0.25); }
  .mood-tag.relax    { background: rgba(107,207,181,0.15); color: #6bcfb5; border: 1px solid rgba(107,207,181,0.25); }
  .mood-tag.miss     { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
  .mood-tag.sexy     { background: rgba(244,114,182,0.15); color: #f472b6; border: 1px solid rgba(244,114,182,0.25); }
  .mood-tag.romantic { background: rgba(251,113,133,0.15); color: #fb7185; border: 1px solid rgba(251,113,133,0.25); }
  .mood-tag.drunk    { background: rgba(249,115,22,0.15);  color: #f97316; border: 1px solid rgba(249,115,22,0.25); }

  .card.mood-highlight {
    border-color: rgba(200,136,42,0.6);
    box-shadow: 0 0 0 1px rgba(200,136,42,0.3), 0 8px 32px rgba(0,0,0,0.3);
  }

  .card.mood-dim {
    opacity: 0.3;
    filter: grayscale(0.4);
    transform: none !important;
    pointer-events: none;
  }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.7rem;
    color: rgba(107,95,78,0.5);
    border-top: 1px solid rgba(200,136,42,0.08);
  }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">The Educated Barfly · 經典調酒全集</p>
  <h1>50 款你必須學會的<br><em>經典調酒</em></h1>
  <p class="header-sub">成分 · 比例 · 製作方式 — 點擊卡片展開詳細配方</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="搜尋調酒名稱或基酒…">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="whiskey">威士忌</button>
    <button class="filter-btn" data-filter="gin">琴酒</button>
    <button class="filter-btn" data-filter="rum">蘭姆酒</button>
    <button class="filter-btn" data-filter="tequila">龍舌蘭</button>
    <button class="filter-btn" data-filter="brandy">白蘭地</button>
    <button class="filter-btn" data-filter="vodka">伏特加</button>
    <button class="filter-btn" data-filter="other">其他</button>
  </div>
</div>
<div class="mood-section">
  <p class="mood-label">今晚的心情是？</p>
  <div class="mood-btns">
    <button class="mood-btn mood-happy"    data-mood="happy">   <span class="mood-emoji">😄</span> 開心 </button>
    <button class="mood-btn mood-relax"    data-mood="relax">   <span class="mood-emoji">🌿</span> 放鬆 </button>
    <button class="mood-btn mood-miss"     data-mood="miss">    <span class="mood-emoji">🌙</span> 思念 </button>
    <button class="mood-btn mood-sexy"     data-mood="sexy">    <span class="mood-emoji">🔥</span> 性愛 </button>
    <button class="mood-btn mood-romantic" data-mood="romantic"><span class="mood-emoji">🌹</span> 浪漫 </button>
    <button class="mood-btn mood-drunk"    data-mood="drunk">   <span class="mood-emoji">🥃</span> 就是要爛醉 </button>
  </div>
</div>
<p class="count-bar">顯示 <span id="count">50</span> / 50 款調酒</p>

<div class="grid" id="grid"></div>

<footer>配方參考自 The Educated Barfly YouTube 頻道 · 僅供學習參考</footer>

function getImageUrl(cocktail) {
  const keywords = cocktailKeywords[cocktail.name] || 
    encodeURIComponent(cocktail.name.toLowerCase()) + '+cocktail+drink';
  // Use sig parameter to get consistent image for each cocktail
  return `https://source.unsplash.com/featured/600x400/?${keywords}&sig=${cocktail.id * 7919}`;
}

function loadPhotoForCard(el, cocktail) {
  const wrap = el.querySelector('.card-photo-wrap');
  const skeleton = el.querySelector('.photo-skeleton');
  const img = el.querySelector('.card-photo-img');
  if (!wrap || img.dataset.loaded === 'true') return;

  const url = getImageUrl(cocktail);
  img.src = url;
  img.onload = () => {
    img.classList.add('loaded');
    img.dataset.loaded = 'true';
    if (skeleton) skeleton.classList.add('hidden');
  };
  img.onerror = () => {
    // fallback to generic cocktail image
    img.src = `https://source.unsplash.com/featured/600x400/?cocktail,drink,bar&sig=${cocktail.id * 1337}`;
    img.onload = () => {
      img.classList.add('loaded');
      img.dataset.loaded = 'true';
      if (skeleton) skeleton.classList.add('hidden');
    };
  };
}

function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('count').textContent = list.length;
  list.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = (i * 0.04) + 's';
    el.dataset.id = c.id;
    el.innerHTML = `
      <div class="card-num">No. ${String(c.id).padStart(2,'0')}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-badges">
        ${c.badges.map((b,idx) => `<span class="badge ${idx===0?'badge-spirit':'badge-method'}">${b}</span>`).join('')}
      </div>
      <div class="card-preview">${c.preview}</div>
      ${c.moods && c.moods.length ? `<div class="mood-tags">${c.moods.map(m => `<span class="mood-tag ${m}">${moodLabels[m]}</span>`).join('')}</div>` : ''}
      <div class="card-expand">
        <div class="section-label">成分與比例</div>
        <ul class="ingredients-list">
          ${c.ingredients.map(ing => `<li><span class="ing-name">${ing.name}</span><span class="ing-amount">${ing.amount}</span></li>`).join('')}
        </ul>
        <div class="section-label">製作方式</div>
        <p class="method-text">${c.method}</p>
        <div class="garnish-row"><span>裝飾</span>${c.garnish}</div>
        <div class="section-label" style="margin-top:1.25rem">成品圖</div>
        <div class="card-photo-wrap">
          <div class="photo-skeleton">載入圖片中…</div>
          <img class="card-photo-img" alt="${c.name} cocktail" src="" />
          <div class="photo-credit">Photo via <a href="https://unsplash.com?utm_source=cocktail_guide&utm_medium=referral" target="_blank">Unsplash</a></div>
        </div>
      </div>
      <div class="toggle-icon">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
          <rect x="4" y="0" width="2" height="10"/>
          <rect x="0" y="4" width="10" height="2" class="h-bar"/>
        </svg>
      </div>
    `;
    el.addEventListener('click', () => {
      const wasExpanded = el.classList.contains('expanded');
      el.classList.toggle('expanded');
      const hBar = el.querySelector('.h-bar');
      if (el.classList.contains('expanded')) {
        hBar.style.display = 'none';
        if (!wasExpanded) loadPhotoForCard(el, c);
      } else {
        hBar.style.display = '';
      }
    });
    grid.appendChild(el);
  });
}

let currentFilter = 'all';
let currentSearch = '';
let currentMood = null;

const moodLabels = {
  happy:    '😄 開心',
  relax:    '🌿 放鬆',
  miss:     '🌙 思念',
  sexy:     '🔥 性愛',
  romantic: '🌹 浪漫',
  drunk:    '🥃 爛醉'
};

function applyFilters() {
  let list = cocktails;
  if (currentFilter !== 'all') list = list.filter(c => c.spirit === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(c => c.name.toLowerCase().includes(q) || c.badges.some(b => b.toLowerCase().includes(q)) || c.preview.toLowerCase().includes(q));
  }
  renderCards(list);

  // Mood highlight/dim (applied after render, no filtering)
  if (currentMood) {
    document.querySelectorAll('.card').forEach(card => {
      const id = parseInt(card.dataset.id);
      const cocktail = cocktails.find(c => c.id === id);
      if (cocktail && cocktail.moods && cocktail.moods.includes(currentMood)) {
        card.classList.add('mood-highlight');
        card.classList.remove('mood-dim');
      } else {
        card.classList.add('mood-dim');
        card.classList.remove('mood-highlight');
      }
    });
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mood = btn.dataset.mood;
    if (currentMood === mood) {
      // Toggle off
      currentMood = null;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.card').forEach(c => {
        c.classList.remove('mood-highlight', 'mood-dim');
        c.style.pointerEvents = '';
      });
    } else {
      currentMood = mood;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
      // Re-enable pointer on highlighted cards
      document.querySelectorAll('.card.mood-highlight').forEach(c => {
        c.style.pointerEvents = '';
      });
    }
  });
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  applyFilters();
});

renderCards(cocktails);
