<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bartender Yu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --cream: #f5efe3;
    --amber: #c8882a;
    --amber-light: #e8b24a;
    --amber-dark: #8a5a10;
    --copper: #b5622a;
    --smoke: #6b5f4e;
    --paper: #ede5d2;
    --gold: #d4a853;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--ink);
    background-image: 
      radial-gradient(ellipse at 20% 10%, rgba(200,136,42,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(181,98,42,0.06) 0%, transparent 60%);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 4rem 2rem 2rem;
    position: relative;
  }

  header::before {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--amber);
    margin: 0 auto 1.5rem;
  }

  .header-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 7vw, 5.5rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  h1 em {
    font-style: italic;
    color: var(--amber-light);
  }

  .header-sub {
    font-size: 0.98rem;
    color: var(--smoke);
    letter-spacing: 0.05em;
    margin-top: 1rem;
  }

  .controls {
    max-width: 900px;
    margin: 2.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-wrap svg {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--smoke);
    width: 16px;
    height: 16px;
  }

  #search {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,136,42,0.2);
    border-radius: 4px;
    padding: 0.65rem 1rem 0.65rem 2.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.98rem;
    color: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--smoke); }
  #search:focus { border-color: var(--amber); }

  .filter-btns {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid rgba(200,136,42,0.25);
    border-radius: 3px;
    padding: 0.5rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--smoke);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
  }

  .count-bar {
    text-align: center;
    font-size: 0.86rem;
    color: var(--smoke);
    margin: 1.5rem auto 0;
    letter-spacing: 0.05em;
  }

  .count-bar span { color: var(--amber); }

  .grid {
    max-width: 1400px;
    margin: 2rem auto;
    padding: 0 1.5rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: #1a1208;
    border: 1px solid rgba(200,136,42,0.15);
    border-radius: 6px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .card:hover {
    border-color: rgba(200,136,42,0.4);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .card:hover::before { opacity: 1; }

  .card.expanded {
    border-color: var(--amber);
  }

  .card-num {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--amber-dark);
    margin-bottom: 0.5rem;
    font-family: 'DM Sans', sans-serif;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .card-badges {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-bottom: 0.9rem;
  }

  .badge {
    font-size: 0.71rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    border: 1px solid;
  }

  .badge-spirit {
    color: var(--amber-light);
    border-color: rgba(200,136,42,0.3);
    background: rgba(200,136,42,0.08);
  }

  .badge-method {
    color: var(--copper);
    border-color: rgba(181,98,42,0.3);
    background: rgba(181,98,42,0.08);
  }

  .card-preview {
    font-size: 0.92rem;
    color: var(--smoke);
    line-height: 1.5;
  }

  .card-expand {
    display: none;
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid rgba(200,136,42,0.12);
    animation: slideDown 0.25s ease;
  }

  .card.expanded .card-expand { display: block; }

  .section-label {
    font-size: 0.71rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,136,42,0.15);
  }

  .ingredients-list {
    list-style: none;
    margin-bottom: 1.25rem;
  }

  .ingredients-list li {
    font-size: 0.94rem;
    color: #c8b99a;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.75rem;
  }

  .ingredients-list li:last-child { border-bottom: none; }

  .ing-name { color: var(--cream); }
  .ing-amount { 
    color: var(--amber); 
    font-size: 0.86rem;
    white-space: nowrap;
    font-weight: 500;
  }

  .method-text {
    font-size: 0.94rem;
    color: #c8b99a;
    line-height: 1.7;
  }

  .garnish-row {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.9rem;
    color: var(--smoke);
  }

  .garnish-row span:first-child {
    font-size: 0.69rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber-dark);
    white-space: nowrap;
  }

  
    100% { background-position: 200% 0; }
  }

  .toggle-icon {
    position: absolute;
    bottom: 1.25rem;
    right: 1.5rem;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(200,136,42,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--amber-dark);
    overflow: hidden;
  }

  .card:hover .toggle-icon { border-color: var(--amber); color: var(--amber); }
  .card.expanded .toggle-icon { background: var(--amber); color: var(--ink); border-color: var(--amber); }

  .hidden { display: none !important; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }


  /* ── 心情篩選 ── */
  .mood-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 0;
  }

  .mood-label {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--smoke);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .mood-label::before,
  .mood-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(200,136,42,0.12);
  }

  .mood-btns {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mood-btn {
    background: transparent;
    border: 1px solid rgba(200,136,42,0.18);
    border-radius: 100px;
    padding: 0.55rem 1.2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.94rem;
    font-weight: 400;
    color: var(--smoke);
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    gap: 0.45rem;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }

  .mood-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.22s;
    border-radius: 100px;
  }

  .mood-btn:hover {
    color: var(--cream);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }

  .mood-btn.active {
    color: var(--ink);
    font-weight: 500;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  .mood-btn .mood-emoji { font-size: 1.15rem; line-height: 1; }

  /* Individual mood colours */
  .mood-happy  { --mc: #f5c842; }
  .mood-relax  { --mc: #6bcfb5; }
  .mood-miss   { --mc: #a78bfa; }
  .mood-sexy   { --mc: #f472b6; }
  .mood-romantic { --mc: #fb7185; }
  .mood-drunk  { --mc: #f97316; }

  .mood-btn:hover  { border-color: var(--mc); color: var(--mc); }
  .mood-btn.active { background: var(--mc); border-color: var(--mc); }
  .mood-btn.active::before { opacity: 0; }

  /* mood tag on card */
  .mood-tags {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    margin-top: 0.6rem;
  }

  .mood-tag {
    font-size: 0.69rem;
    padding: 0.18rem 0.5rem;
    border-radius: 100px;
    opacity: 0.7;
  }

  .mood-tag.happy    { background: rgba(245,200,66,0.15);  color: #f5c842; border: 1px solid rgba(245,200,66,0.25); }
  .mood-tag.relax    { background: rgba(107,207,181,0.15); color: #6bcfb5; border: 1px solid rgba(107,207,181,0.25); }
  .mood-tag.miss     { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
  .mood-tag.sexy     { background: rgba(244,114,182,0.15); color: #f472b6; border: 1px solid rgba(244,114,182,0.25); }
  .mood-tag.romantic { background: rgba(251,113,133,0.15); color: #fb7185; border: 1px solid rgba(251,113,133,0.25); }
  .mood-tag.drunk    { background: rgba(249,115,22,0.15);  color: #f97316; border: 1px solid rgba(249,115,22,0.25); }



  /* ── 空狀態 ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 6rem 2rem;
    animation: fadeUp 0.5s ease;
  }

  .empty-icon {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    display: block;
    filter: drop-shadow(0 0 30px rgba(200,136,42,0.3));
    animation: float 3s ease-in-out infinite;
  }

  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--cream);
    margin-bottom: 0.75rem;
  }

  .empty-hint {
    font-size: 0.98rem;
    color: var(--smoke);
    letter-spacing: 0.03em;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }


  /* ── 頂部動作列 ── */
  .action-bar {
    max-width: 900px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.75rem;
  }

  .action-btn {
    background: transparent;
    border: 1px solid rgba(200,136,42,0.25);
    border-radius: 5px;
    padding: 0.6rem 1.4rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--smoke);
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .action-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }

  .action-btn.active-view {
    background: rgba(200,136,42,0.12);
    border-color: var(--amber);
    color: var(--amber-light);
  }

  .action-btn .btn-count {
    background: var(--amber);
    color: var(--ink);
    font-size: 0.71rem;
    font-weight: 700;
    padding: 0.1rem 0.45rem;
    border-radius: 100px;
    min-width: 1.4rem;
    text-align: center;
    transition: all 0.2s;
  }

  .action-btn .btn-count.zero { opacity: 0.4; }


    /* ── 收藏按鈕（卡片內） ── */
  .fav-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.26rem;
    line-height: 1;
    opacity: 0.3;
    transition: all 0.2s ease;
    z-index: 2;
    padding: 0.2rem;
  }

  .fav-btn:hover { opacity: 0.8; transform: scale(1.2); }
  .fav-btn.saved { opacity: 1; filter: drop-shadow(0 0 6px rgba(251,113,133,0.6)); }

  /* ── 隨機推薦 modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: linear-gradient(145deg, #2a1e0e, #1a1208);
    border: 1px solid rgba(200,136,42,0.35);
    border-radius: 10px;
    padding: 2.5rem 2rem 2rem;
    max-width: 480px;
    width: 100%;
    position: relative;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-overlay.show .modal {
    transform: translateY(0) scale(1);
  }

  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none;
    border: none;
    color: var(--smoke);
    font-size: 1.3rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--cream); }

  .modal-eyebrow {
    font-size: 0.71rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 0.5rem;
  }

  .modal-cocktail-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--cream);
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }

  .modal-preview {
    font-size: 0.95rem;
    color: var(--smoke);
    margin-bottom: 1.25rem;
    line-height: 1.6;
  }

  .modal-badges {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-bottom: 1.4rem;
  }

  .modal .section-label { margin-top: 0; }

  .modal-ingredients {
    list-style: none;
    margin-bottom: 1.25rem;
  }

  .modal-ingredients li {
    font-size: 0.95rem;
    color: #c8b99a;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    gap: 1rem;
  }

  .modal-ingredients li:last-child { border-bottom: none; }

  .modal-method {
    font-size: 0.95rem;
    color: #c8b99a;
    line-height: 1.75;
    margin-bottom: 1rem;
  }

  .modal-garnish {
    font-size: 0.9rem;
    color: var(--smoke);
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .modal-garnish span:first-child {
    font-size: 0.69rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber-dark);
  }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.75rem;
  }

  .modal-btn {
    flex: 1;
    padding: 0.7rem;
    border-radius: 5px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid;
  }

  .modal-btn-primary {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
  }
  .modal-btn-primary:hover { background: var(--amber-light); }

  .modal-btn-secondary {
    background: transparent;
    border-color: rgba(200,136,42,0.3);
    color: var(--smoke);
  }
  .modal-btn-secondary:hover { border-color: var(--amber); color: var(--amber); }

  /* ── 收藏空狀態 ── */
  .fav-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 5rem 2rem;
    animation: fadeUp 0.4s ease;
  }

  .fav-empty .empty-icon { font-size: 3rem; margin-bottom: 1.2rem; display: block; }
  .fav-empty .empty-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--cream); margin-bottom: 0.5rem; }
  .fav-empty .empty-hint { font-size: 0.94rem; color: var(--smoke); }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.8rem;
    color: rgba(107,95,78,0.5);
    border-top: 1px solid rgba(200,136,42,0.08);
  }

  .story-text {
    font-size: 0.9rem;
    color: #a89880;
    line-height: 1.75;
    font-style: italic;
    margin-top: 0.25rem;
    padding: 0.75rem 1rem;
    border-left: 2px solid rgba(200,136,42,0.3);
    background: rgba(200,136,42,0.04);
    border-radius: 0 4px 4px 0;
  }


  .card-photo-wrap {
    position: relative;
    width: 100%;
    background: rgba(0,0,0,0.25);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .photo-skeleton {
    display: none;
  }
  .photo-skeleton.hidden { display: none; }
  .card-photo-img {
    width: 100%;
    height: auto;
    display: block;
    opacity: 0;
    transition: opacity 0.4s;
    position: relative;
    z-index: 2;
  }
  .card-photo-img.loaded { opacity: 1; }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">Just for you</p>
  <h1><em>Bartender Yu</em></h1>
  <p class="header-sub">成分 · 比例 · 製作方式 — 點擊卡片展開詳細配方</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="搜尋調酒名稱或基酒…">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="whiskey">威士忌</button>
    <button class="filter-btn" data-filter="gin">琴酒</button>
    <button class="filter-btn" data-filter="rum">蘭姆酒</button>
    <button class="filter-btn" data-filter="tequila">龍舌蘭</button>
    <button class="filter-btn" data-filter="brandy">白蘭地</button>
    <button class="filter-btn" data-filter="vodka">伏特加</button>

function loadPhotoForCard(el, cocktail) {
  const skeleton = el.querySelector('.photo-skeleton');
  const img = el.querySelector('.card-photo-img');
  if (!img || img.dataset.loaded === 'true') return;
  const url = cocktailImages[cocktail.name];
  if (!url) { if (skeleton) skeleton.style.display = 'none'; return; }
  img.src = url;
  img.onload = () => {
    img.classList.add('loaded');
    img.dataset.loaded = 'true';
    if (skeleton) skeleton.classList.add('hidden');
  };
  img.onerror = () => {
    if (skeleton) skeleton.style.display = 'none';
  };
}

function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('count').textContent = list.length;
  list.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = (i * 0.04) + 's';
    el.dataset.id = c.id;
    el.innerHTML = `
      <button class="fav-btn ${favourites.has(c.id)?'saved':''}" data-id="${c.id}" title="加入收藏">${favourites.has(c.id)?'❤️':'🤍'}</button>
      <div class="card-num">No. ${String(c.id).padStart(2,'0')}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-badges">
        ${c.badges.map((b,idx) => `<span class="badge ${idx===0?'badge-spirit':'badge-method'}">${b}</span>`).join('')}
      </div>
      <div class="card-preview">${c.preview}</div>
      ${c.moods && c.moods.length ? `<div class="mood-tags">${c.moods.map(m => `<span class="mood-tag ${m}">${moodLabels[m]}</span>`).join('')}</div>` : ''}
      <div class="card-expand">
        <div class="card-photo-wrap">
          <div class="photo-skeleton"></div>
          <img class="card-photo-img" alt="${c.name}" src="" />
        </div>
        <div class="section-label">成分與比例</div>
        <ul class="ingredients-list">
          ${c.ingredients.map(ing => `<li><span class="ing-name">${ing.name}</span><span class="ing-amount">${ing.amount}</span></li>`).join('')}
        </ul>
        <div class="section-label">製作方式</div>
        <p class="method-text">${c.method}</p>
        <div class="garnish-row"><span>裝飾</span>${c.garnish}</div>
        ${c.story ? `<div class="section-label" style="margin-top:1.25rem">酒的故事</div><p class="story-text">${c.story}</p>` : ''}

      </div>
      <div class="toggle-icon">
        <span class="toggle-plus">＋</span>
        <span class="toggle-minus" style="display:none">－</span>
      </div>
    `;
    // Fav button: stop propagation so it doesn't expand card
    el.querySelector('.fav-btn').addEventListener('click', e => {
      e.stopPropagation();
      toggleFav(c.id, e.currentTarget);
    });

    el.addEventListener('click', () => {
      const wasExpanded = el.classList.contains('expanded');
      if (!wasExpanded) loadPhotoForCard(el, c);
      el.classList.toggle('expanded');
      const plus = el.querySelector('.toggle-plus');
      const minus = el.querySelector('.toggle-minus');
      if (el.classList.contains('expanded')) {
        if (plus) plus.style.display = 'none';
        if (minus) minus.style.display = '';
      } else {
        if (plus) plus.style.display = '';
        if (minus) minus.style.display = 'none';
      }
    });
    grid.appendChild(el);
  });
}



const moodLabels = {
  happy:    '😄 開心',
  relax:    '🌿 放鬆',
  miss:     '🌙 思念',
  sexy:     '🔥 性愛',
  romantic: '🌹 浪漫',
  drunk:    '🥃 爛醉'
};

function showEmptyState() {
  const grid = document.getElementById('grid');
  if (!currentMood && currentFilter === 'all' && !currentSearch) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🍸</div>
        <p class="empty-title">今晚想喝什麼？</p>
        <p class="empty-hint">選擇一個心情，或用搜尋找到你的調酒</p>
      </div>
    `;
    document.getElementById('count').textContent = '0';
    return true;
  }
  return false;
}

function applyFilters() {
  viewingFavs = false;
  document.getElementById('btn-favs').classList.remove('active-view');
  // If no mood selected and no search, show empty state
  if (!currentMood && !currentSearch) {
    if (showEmptyState()) return;
  }

  let list = cocktails;

  // Filter by mood first (only show matching mood cards)
  if (currentMood) {
    list = list.filter(c => c.moods && c.moods.includes(currentMood));
  }

  if (currentFilter !== 'all') list = list.filter(c => c.spirit === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(c => c.name.toLowerCase().includes(q) || c.badges.some(b => b.toLowerCase().includes(q)) || c.preview.toLowerCase().includes(q));
  }
  renderCards(list);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mood = btn.dataset.mood;
    if (currentMood === mood) {
      currentMood = null;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    } else {
      currentMood = mood;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  applyFilters();
});


// ── 收藏 ──────────────────────────────────────────

function updateFavCount() {
  const el = document.getElementById('fav-count');
  el.textContent = favourites.size;
  el.classList.toggle('zero', favourites.size === 0);
}

function toggleFav(id, btnEl) {
  if (favourites.has(id)) {
    favourites.delete(id);
    if (btnEl) { btnEl.textContent = '🤍'; btnEl.classList.remove('saved'); }
  } else {
    favourites.add(id);
    if (btnEl) { btnEl.textContent = '❤️'; btnEl.classList.add('saved'); }
  }
  updateFavCount();
  // If in favs view, refresh
  if (viewingFavs) showFavourites();
  // Sync modal button
  if (currentModalCocktail && currentModalCocktail.id === id) {
    const mb = document.getElementById('modal-fav-btn');
    mb.textContent = favourites.has(id) ? '❤️ 已收藏' : '🤍 加入收藏';
  }
  // Sync all fav buttons on cards
  document.querySelectorAll('.fav-btn').forEach(b => {
    if (parseInt(b.dataset.id) === id) {
      b.textContent = favourites.has(id) ? '❤️' : '🤍';
      b.classList.toggle('saved', favourites.has(id));
    }
  });
}

function showFavourites() {
  viewingFavs = true;
  document.getElementById('btn-favs').classList.add('active-view');
  // Clear mood/search active state visually but keep data
  const list = cocktails.filter(c => favourites.has(c.id));
  const grid = document.getElementById('grid');
  if (list.length === 0) {
    grid.innerHTML = `
      <div class="fav-empty">
        <span class="empty-icon">🤍</span>
        <p class="empty-title">還沒有收藏</p>
        <p class="empty-hint">在調酒卡片右上角點 🤍 加入收藏</p>
      </div>`;
    document.getElementById('count').textContent = '0';
  } else {
    renderCards(list);
  }
}

document.getElementById('btn-favs').addEventListener('click', () => {
  if (viewingFavs) {
    // Toggle off
    viewingFavs = false;
    document.getElementById('btn-favs').classList.remove('active-view');
    applyFilters();
  } else {
    // Clear mood/filter highlight
    currentMood = null;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    showFavourites();
  }
});

// ── 隨機推薦 ──────────────────────────────────────────
function openModal(cocktail, eyebrow) {
  currentModalCocktail = cocktail;
  document.getElementById('modal-eyebrow').textContent = eyebrow || '今晚推薦';
  document.getElementById('modal-name').textContent = cocktail.name;
  document.getElementById('modal-preview').textContent = cocktail.preview;
  document.getElementById('modal-method').textContent = cocktail.method;
  document.getElementById('modal-garnish').textContent = cocktail.garnish;

  const badges = document.getElementById('modal-badges');
  badges.innerHTML = cocktail.badges.map((b,i) =>
    `<span class="badge ${i===0?'badge-spirit':'badge-method'}">${b}</span>`
  ).join('');

  const ings = document.getElementById('modal-ingredients');
  ings.innerHTML = cocktail.ingredients.map(ing =>
    `<li><span class="ing-name">${ing.name}</span><span class="ing-amount">${ing.amount}</span></li>`
  ).join('');

  const mb = document.getElementById('modal-fav-btn');
  mb.textContent = favourites.has(cocktail.id) ? '❤️ 已收藏' : '🤍 加入收藏';

  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
  currentModalCocktail = null;
}

function randomCocktail() {
  const pick = cocktails[Math.floor(Math.random() * cocktails.length)];
  openModal(pick, '🎲 今晚就喝這杯');
}

document.getElementById('btn-random').addEventListener('click', randomCocktail);
document.getElementById('modal-shuffle').addEventListener('click', randomCocktail);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('modal-fav-btn').addEventListener('click', () => {
  if (currentModalCocktail) toggleFav(currentModalCocktail.id, null);
});

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Show empty state on load
document.getElementById('grid').innerHTML = '';
document.getElementById('count').textContent = '0';
showEmptyState();
</script>
